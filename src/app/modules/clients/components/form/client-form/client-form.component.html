<div class="page">
    <p-toast></p-toast>
    <p-confirmDialog></p-confirmDialog>

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <div class="page-header">
        <div class="header-left">
            <a routerLink="/clients" class="back-link">← Clients</a>
            <h1>{{ isEdit ? 'Modifier le client' : 'Nouveau client' }}</h1>
        </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-layout">

        <!-- ── Type de client ─────────────────────────────────────────────── -->
        <div class="form-card">
            <h3>Type de client</h3>
            <div class="type-toggle">
                <label class="toggle-opt" [class.selected]="form.get('type')?.value === 'individual'">
                    <input type="radio" formControlName="type" value="individual" hidden />
                    👤 Particulier
                </label>
                <label class="toggle-opt" [class.selected]="form.get('type')?.value === 'company'">
                    <input type="radio" formControlName="type" value="company" hidden />
                    🏢 Entreprise
                </label>
            </div>
        </div>

        <div class="form-cols">

            <!-- ── Colonne gauche ──────────────────────────────────────────── -->
            <div class="form-col">
                <div class="form-card">
                    <h3>Informations du contact</h3>

                    <!-- Raison sociale (entreprise seulement) -->
                    <div class="form-group" *ngIf="form.get('type')?.value === 'company'">
                        <label>Raison sociale</label>
                        <input formControlName="company_name" placeholder="SONAPOST, Hôtel Laïco..." />
                    </div>

                    <!-- Prénom + Nom -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Prénom *</label>
                            <input formControlName="contact_first_name" placeholder="Karim" />
                            <span class="field-error" *ngIf="form.get('contact_first_name')?.invalid && form.get('contact_first_name')?.touched">
                Champ requis
              </span>
                        </div>
                        <div class="form-group">
                            <label>Nom *</label>
                            <input formControlName="contact_last_name" placeholder="Ouedraogo" />
                            <span class="field-error" *ngIf="form.get('contact_last_name')?.invalid && form.get('contact_last_name')?.touched">
                Champ requis
              </span>
                        </div>
                    </div>

                    <!-- Téléphone + Mobile -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Téléphone *</label>
                            <input formControlName="phone" placeholder="70 00 00 00" />
                            <span class="field-error" *ngIf="form.get('phone')?.invalid && form.get('phone')?.touched">
                Champ requis
              </span>
                        </div>
                        <div class="form-group">
                            <label>Mobile</label>
                            <input formControlName="mobile" placeholder="76 00 00 00" />
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" formControlName="email" placeholder="karim@exemple.com" />
                        <span class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
              Email invalide
            </span>
                    </div>

                    <!-- IFU / TVA (entreprise) -->
                    <div class="form-group" *ngIf="form.get('type')?.value === 'company'">
                        <label>Numéro IFU / TVA</label>
                        <input formControlName="tax_number" placeholder="0000000X" />
                    </div>

                    <!-- Groupe tarifaire -->
                    <div class="form-group">
                        <label>Groupe tarifaire</label>
                        <select formControlName="client_group_id">
                            <option [ngValue]="null">— Standard (aucun groupe) —</option>
                            <option *ngFor="let g of groups()" [ngValue]="g.id">
                                {{ g.name }}
                                <span *ngIf="g.default_discount > 0"> (−{{ g.default_discount }}%)</span>
                            </option>
                        </select>
                    </div>

                    <!-- Statut -->
                    <div class="form-group">
                        <label>Statut</label>
                        <div class="radio-group">
                            <label class="radio-opt" [class.selected]="form.get('status')?.value === 'active'">
                                <input type="radio" formControlName="status" value="active" hidden />
                                <span class="dot dot-green"></span> Actif
                            </label>
                            <label class="radio-opt" [class.selected]="form.get('status')?.value === 'inactive'">
                                <input type="radio" formControlName="status" value="inactive" hidden />
                                <span class="dot dot-red"></span> Inactif
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Colonne droite ──────────────────────────────────────────── -->
            <div class="form-col">
                <div class="form-card">
                    <h3>📍 Adresse</h3>
                    <div class="form-group">
                        <label>Adresse / Secteur</label>
                        <input formControlName="billing_address" placeholder="Secteur 15, Ouagadougou" />
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ville</label>
                            <input formControlName="city" placeholder="Ouagadougou" />
                        </div>
                        <div class="form-group">
                            <label>Code postal / BP</label>
                            <input formControlName="postal_code" placeholder="01 BP 1234" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Pays</label>
                        <input formControlName="country" placeholder="Burkina Faso" />
                    </div>
                </div>

                <!-- Points de fidélité (édition seulement) -->
                <div class="form-card" *ngIf="isEdit">
                    <h3>🎖️ Fidélité</h3>
                    <div class="form-group">
                        <label>Points de fidélité</label>
                        <input type="number" formControlName="loyalty_points" min="0" />
                    </div>
                </div>

                <div class="form-card">
                    <h3>📝 Notes internes</h3>
                    <div class="form-group">
            <textarea formControlName="notes" rows="4"
                      placeholder="Préférences, remarques, historique..."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Actions ────────────────────────────────────────────────────── -->
        <div class="form-actions">
            <a routerLink="/clients" class="btn-cancel">Annuler</a>
            <button type="submit" class="btn-submit" [disabled]="form.invalid || saving()">
                {{ saving() ? 'Enregistrement...' : (isEdit ? '💾 Modifier' : '✅ Créer le client') }}
            </button>
        </div>

    </form>
</div>
